---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - aiscaler.io
  resources:
  - aiscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - aiscaler.io
  resources:
  - aiscalers/finalizers
  verbs:
  - update
- apiGroups:
  - aiscaler.io
  resources:
  - aiscalers/status
  verbs:
  - get
  - patch
  - update
