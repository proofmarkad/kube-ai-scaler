                type: object
              slos:
                description: SLO definitions
                items:
                  description: SLO defines a Service Level Objective.
                  properties:
                    metric:
                      type: string
                    name:
                      type: string
                    priority:
                      format: int32
                      type: integer
                    target:
                      type: number
                  required:
                  - metric
                  - name
                  - target
                  type: object
                type: array
              statefulSetPolicy:
                description: StatefulSet-specific policy
                properties:
                  drainTimeout:
                    type: string
                  pvcRetention:
                    type: string
                  scaleDownPolicy:
                    enum:
                    - oneAtATime
                    - maxUnavailable
                    type: string
                type: object
              targetRef:
                properties:
                  apiVersion:
                    default: apps/v1
                    type: string
                  kind:
                    default: Deployment
                    enum:
                    - Deployment
                    - StatefulSet
                    - Rollout
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                - namespace
                type: object
              tier:
                description: Workload tier for priority scheduling
                enum:
                - critical
                - standard
                - best-effort
                type: string
              verticalScaling:
                description: Vertical scaling configuration
                properties:
                  constraints:
                    description: VerticalConstraints defines resource limits for vertical
                      scaling.
                    properties:
                      maxCPURequest:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      maxCPUStepPercent:
                        format: int32
                        type: integer
                      maxMemoryRequest:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      maxMemoryStepPercent:
                        format: int32
                        type: integer
                      minCPURequest:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      minMemoryRequest:
                        anyOf:
                        - type: integer
                        - type: string
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
