                - anthropic
                - gemini
                - ollama
                - deepseek
                type: string
              lastScaleTime:
                format: date-time
                type: string
              llmTelemetry:
                description: LLM usage telemetry
                properties:
                  averageLatencyMs:
                    type: number
                  errorRate:
                    type: number
                  fallbackRate:
                    type: number
                  totalCallsToday:
                    format: int32
                    type: integer
                type: object
              phase:
                type: string
              precedence:
                description: Precedence resolution
                properties:
                  activeOverrides:
                    items:
                      description: ActiveOverride records an active override.
                      properties:
                        expiresAt:
