                          - name
                          - namespace
                          type: object
                        type:
                          enum:
                          - slack
                          - pagerduty
                          - webhook
                          - email
                          type: string
                      required:
                      - type
                      type: object
                    type: array
                  enabled:
                    type: boolean
                  requireApprovalWhen:
