                              - Deployment
                              - StatefulSet
                              - Rollout
                              type: string
                            name:
                              type: string
                            namespace:
                              type: string
                          required:
                          - name
                          - namespace
                          type: object
                      required:
                      - targetRef
                      type: object
                    type: array
                  downstreamOf:
                    items:
                      properties:
                        apiVersion:
                          default: apps/v1
                          type: string
                        kind:
                          default: Deployment
                          enum:
                          - Deployment
                          - StatefulSet
                          - Rollout
                          type: string
                        name:
                          type: string
                        namespace:
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                    type: array
                  upstreamOf:
