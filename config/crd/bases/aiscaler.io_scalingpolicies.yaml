---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: scalingpolicies.aiscaler.io
spec:
  group: aiscaler.io
  names:
    kind: ScalingPolicy
    listKind: ScalingPolicyList
    plural: scalingpolicies
    shortNames:
    - sp
    singular: scalingpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.appliedTo
      name: Applied
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ScalingPolicySpec defines the desired state of ScalingPolicy.
            properties:
              defaults:
                description: Defaults applied to all AIScalers unless overridden
                properties:
                  costConstraints:
                    description: CostConstraints defines hard cost limits for a workload.
                    properties:
                      currency:
                        default: USD
                        type: string
                      enforcement:
                        default: soft
                        enum:
                        - hard
                        - soft
                        type: string
                      maxHourlyCost:
                        type: number
                      maxMonthlyCost:
                        type: number
                    type: object
                  llmRateLimit:
                    description: LLMRateLimit configures rate limiting for LLM API
                      calls.
                    properties:
                      maxCallsPerHour:
                        format: int32
                        type: integer
                      maxCallsPerMinute:
                        format: int32
                        type: integer
                      maxConcurrentCalls:
                        format: int32
                        type: integer
                    type: object
                  safety:
                    description: SafetyConfig defines safety guardrails.
                    properties:
                      autoRollback:
                        description: AutoRollbackConfig configures automatic rollback
                          on degradation.
                        properties:
                          conditions:
                            items:
                              type: string
                            type: array
                          enabled:
                            type: boolean
                        required:
                        - enabled
                        type: object
                      circuitBreaker:
                        description: CircuitBreakerConfig configures the safety circuit
                          breaker.
                        properties:
                          enabled:
                            type: boolean
                          resetAfter:
                            type: string
                          tripAfter:
                            format: int32
                            type: integer
                          tripConditions:
                            items:
                              type: string
                            type: array
                        required:
                        - enabled
                        type: object
                      maxReplicaChangePerMinute:
                        format: int32
                        type: integer
                      maxWorkloadsChangedPerMinute:
                        format: int32
                        type: integer
                      scaleDown:
                        description: DirectionPolicy defines asymmetric scaling constraints
                          per direction.
                        properties:
                          cooldown:
                            type: string
                          maxStep:
                            format: int32
                            type: integer
                          requireConfidence:
                            type: number
                          requireSLOHeadroom:
                            type: boolean
                        type: object
                      scaleUp:
                        description: DirectionPolicy defines asymmetric scaling constraints
                          per direction.
                        properties:
                          cooldown:
                            type: string
                          maxStep:
                            format: int32
                            type: integer
                          requireConfidence:
                            type: number
                          requireSLOHeadroom:
                            type: boolean
                        type: object
                    type: object
                  slos:
                    items:
                      description: SLO defines a Service Level Objective.
                      properties:
                        metric:
                          type: string
                        name:
                          type: string
                        priority:
                          format: int32
                          type: integer
                        target:
                          type: number
                      required:
                      - metric
                      - name
                      - target
                      type: object
                    type: array
                type: object
              namespaceSelector:
                description: Namespace selector — which namespaces this policy applies
                  to
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - defaults
            type: object
          status:
            description: ScalingPolicyStatus defines the observed state.
            properties:
              appliedTo:
                format: int32
                type: integer
              phase:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
