# Requires:
# - OPENCOST_ENDPOINT=http://opencost.opencost.svc.cluster.local:9003 on the operator
# - SLACK_WEBHOOK_URL if you want approval, rollback, and budget events delivered
apiVersion: aiscaler.io/v1
kind: AIScaler
metadata:
  name: checkout-api-guarded
spec:
  targetRef:
    name: checkout-api
    namespace: default
    kind: Deployment
    apiVersion: apps/v1

  constraints:
    minReplicas: 2
    maxReplicas: 15
    maxScaleStep: 3
    minConfidence: 0.70

  llm:
    primary: anthropic
    apiKeySecret:
      name: llm-api-keys
      namespace: default
      key: anthropic-api-key

  signals:
    - name: metrics-server
      required: true
    - name: annotations
    - name: prometheus
      config:
        baseURL: http://prometheus.monitoring.svc.cluster.local:9090
        p95LatencyQuery: >-
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace="{{namespace}}",deployment="{{deployment}}"}[5m])) by (le))
        errorRateQuery: >-
          sum(rate(http_requests_total{namespace="{{namespace}}",deployment="{{deployment}}",status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total{namespace="{{namespace}}",deployment="{{deployment}}"}[5m])), 1)
    - name: opencost
      config:
        endpoint: http://opencost.opencost.svc.cluster.local:9003
        namespace: default
        window: 1h

  slos:
    - name: p95-latency
      metric: p95_latency
      target: 220
      priority: 100
    - name: error-rate
      metric: error_rate
      target: 0.015
      priority: 90

  costConstraints:
    maxHourlyCost: 8.0
    maxMonthlyCost: 5000.0
    currency: USD
    enforcement: hard

  safety:
    scaleUp:
      maxStep: 4
      requireConfidence: 0.80
    scaleDown:
      maxStep: 1
      requireConfidence: 0.90
    autoRollback:
      enabled: true
      conditions:
        - sloViolationWithin
        - errorRateIncrease
        - latencyIncrease

  approval:
    enabled: true
    requireApprovalWhen:
      - type: ReplicaChangeExceeds
        threshold: 3
      - type: CostIncreaseExceeds
        threshold: 1.5
      - type: ConfidenceBelow
        threshold: 0.80

  precedence:
    sloAlwaysWins: true

  alerting:
    enabled: true
    rules:
      - name: rollback-risk-latency
        condition: p95_latency > 450
        severity: critical
        for: 2m
      - name: cost-pressure
        condition: opencost_total_cost > 7
        severity: warning
        for: 5m

  evaluationInterval: 60s
  cooldownPeriod: 300s